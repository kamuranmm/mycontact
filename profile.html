<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardPro — Profil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0a1628;--blue:#185FA5;--blue-light:#378ADD;--accent:#4FACFE;--white:#fff;--gray:#8A9BB5;--gray-light:#E8EDF5;--surface:#f4f6fb}
body{font-family:'DM Sans',sans-serif;background:var(--surface);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:.75rem}
.topbar{width:100%;max-width:460px;display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;margin-bottom:.4rem}
.brand{display:flex;align-items:center;gap:7px;font-family:'DM Serif Display',serif;font-size:14px;color:var(--navy);text-decoration:none}
.brand-mark{width:26px;height:26px;background:linear-gradient(135deg,var(--blue),var(--accent));border-radius:7px;display:flex;align-items:center;justify-content:center}
.card{width:100%;max-width:460px;background:var(--white);border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(10,22,40,.08)}
.cover{height:130px;background:linear-gradient(135deg,#185FA5,#378ADD);position:relative;overflow:hidden}
.cover img{width:100%;height:100%;object-fit:cover}
.profile-section{padding:0 1.25rem 1.25rem;position:relative}
.avatar-wrap{margin-top:-44px;margin-bottom:9px}
.avatar{width:84px;height:84px;border-radius:50%;border:4px solid var(--white);background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:28px;color:var(--gray);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.avatar img{width:100%;height:100%;object-fit:cover}
.name{font-family:'DM Serif Display',serif;font-size:21px;color:var(--navy);line-height:1.2;margin-bottom:2px}
.position{font-size:13px;color:var(--gray);margin-bottom:1px}
.company{font-size:13px;color:var(--blue);font-weight:500;margin-bottom:9px}
.bio{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:1.1rem;padding-bottom:1.1rem;border-bottom:1px solid var(--gray-light)}
.contact-list{display:flex;flex-direction:column;gap:1px;margin-bottom:1.1rem}
.contact-row{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:9px;text-decoration:none;transition:background .15s}
.contact-row:hover{background:var(--surface)}
.contact-icon{width:34px;height:34px;border-radius:9px;background:rgba(24,95,165,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-text{font-size:13px;color:var(--navy)}
.contact-label{font-size:10px;color:var(--gray)}
.divider{height:1px;background:var(--gray-light);margin:1rem 0}
.social-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.1rem}
.soc-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;text-decoration:none;border:1px solid var(--gray-light);color:var(--navy);background:var(--white);transition:all .15s;cursor:pointer}
.soc-btn:hover{background:var(--surface)}
.soc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.video-section{margin-bottom:1.1rem}
.video-frame{width:100%;aspect-ratio:16/9;border-radius:11px;overflow:hidden;background:var(--surface)}
.video-frame iframe{width:100%;height:100%;border:none}
.pdf-section{margin-bottom:1.1rem}
.pdf-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--gray-light);border-radius:9px;text-decoration:none;transition:background .15s;margin-bottom:7px;cursor:pointer}
.pdf-item:hover{background:var(--surface)}
.pdf-icon{width:34px;height:34px;border-radius:8px;background:#fef2f2;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#e74c3c;flex-shrink:0}
.pdf-name-t{font-size:13px;color:var(--navy);font-weight:500}
.pdf-size-t{font-size:11px;color:var(--gray)}
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:.25rem}
.action-btn{padding:12px;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;border:none;display:flex;align-items:center;justify-content:center;gap:7px}
.action-btn-primary{background:var(--navy);color:var(--white)}
.action-btn-primary:hover{background:#112040}
.action-btn-sec{background:var(--surface);color:var(--navy);border:1px solid var(--gray-light)}
.action-btn-sec:hover{background:var(--gray-light)}
.footer{width:100%;max-width:460px;text-align:center;padding:.9rem;font-size:11px;color:var(--gray)}
.footer a{color:var(--blue);text-decoration:none}
.modal-overlay{position:fixed;inset:0;background:rgba(10,22,40,.6);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:18px;padding:1.75rem;width:calc(100% - 2rem);max-width:300px;text-align:center;transform:translateY(12px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:'DM Serif Display',serif;font-size:19px;color:var(--navy);margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--gray);margin-bottom:1.1rem}
.modal-close{margin-top:.9rem;width:100%;padding:9px;background:var(--surface);border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--navy)}
.loading-screen{position:fixed;inset:0;background:var(--white);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:11px}
.loader{width:34px;height:34px;border:3px solid var(--gray-light);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.not-found{text-align:center;padding:2.5rem 1.25rem}
.toast-pub{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast-pub.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loader"></div>
  <div style="font-size:13px;color:var(--gray)">Yüklənir...</div>
</div>

<div class="topbar">
  <a class="brand" href="index.html">
    <div class="brand-mark"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="13" r="2"/></svg></div>
    Card<span style="color:var(--accent)">Pro</span>
  </a>
  <div style="font-size:11px;color:var(--gray)">Rəqəmsal vizit kart</div>
</div>

<div class="card" id="mainCard" style="display:none">
  <div class="cover" id="coverEl"><img id="coverImg" src="" style="display:none"></div>
  <div class="profile-section">
    <div class="avatar-wrap"><div class="avatar" id="avatarEl">?</div></div>
    <div class="name" id="nameEl">—</div>
    <div class="position" id="positionEl"></div>
    <div class="company" id="companyEl"></div>
    <div class="bio" id="bioEl" style="display:none"></div>
    <div class="contact-list" id="contactList"></div>
    <div class="divider" id="socialDivider" style="display:none"></div>
    <div class="social-row" id="socialRow"></div>
    <div class="video-section" id="videoSection" style="display:none">
      <div style="font-size:13px;font-weight:500;color:var(--navy);margin-bottom:7px">Video</div>
      <div class="video-frame" id="videoFrame"></div>
    </div>
    <div class="pdf-section" id="pdfSection" style="display:none">
      <div style="font-size:13px;font-weight:500;color:var(--navy);margin-bottom:7px">Sənədlər</div>
      <div id="pdfList"></div>
    </div>
    <div class="action-btns">
      <button class="action-btn action-btn-primary" onclick="saveContact()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Kontaktı saxla</button>
      <button class="action-btn action-btn-sec" onclick="openQrModal()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3m0 4h4v-4m-7 0h3"/></svg>QR Kod</button>
    </div>
    <button class="action-btn action-btn-sec" style="width:100%;margin-top:9px" onclick="shareProfile()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Paylaş</button>
  </div>
</div>

<div class="card" id="notFoundCard" style="display:none">
  <div class="not-found"><div style="font-size:40px;margin-bottom:.9rem">🪪</div><div style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--navy);margin-bottom:7px">Profil tapılmadı</div><div style="font-size:13px;color:var(--gray)">Bu link mövcud deyil və ya silinib.</div></div>
</div>

<div class="footer"><a href="index.html">CardPro</a> ilə yaradılmışdır · Siz də öz kartınızı yaradın →</div>

<div class="modal-overlay" id="qrModal">
  <div class="modal">
    <div class="modal-title">QR Kod</div>
    <div class="modal-sub">Skan etdikdə kontaktlar telefonunuza əlavə olunur</div>
    <div id="qrModalCode" style="display:flex;justify-content:center;margin-bottom:.9rem"></div>
    <button class="action-btn action-btn-primary" style="width:100%" onclick="downloadQR()">PNG yüklə</button>
    <button class="modal-close" onclick="document.getElementById('qrModal').classList.remove('open')">Bağla</button>
  </div>
</div>

<div class="toast-pub" id="toastPub"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,get,query,orderByChild,equalTo,update,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyBx81QDpjHSPvhkmnnSUNkJYMvR_fnRTaU",authDomain:"mycontact-e626e.firebaseapp.com",databaseURL:"https://mycontact-e626e-default-rtdb.firebaseio.com",projectId:"mycontact-e626e",storageBucket:"mycontact-e626e.firebasestorage.app",messagingSenderId:"420594516827",appId:"1:420594516827:web:f30266800c690c6ff9107e"};
const app=initializeApp(cfg);const db=getDatabase(app);
let profileData=null,profileUid=null,vCardStr='';
const slug=new URLSearchParams(location.search).get('u');

async function loadProfile(){
  if(!slug){showNotFound();return;}
  try{
    const q=query(ref(db,'users'),orderByChild('slug'),equalTo(slug));
    const snap=await get(q);
    if(!snap.exists()){showNotFound();return;}
    const[uid,data]=Object.entries(snap.val())[0];
    if(data.status==='blocked'){showNotFound();return;}
    profileData=data;profileUid=uid;
    document.title=`${data.name||'Profil'} — CardPro`;

    // Real-time listener — dəyişiklik olsa avtomatik yenilənir
    onValue(ref(db,`users/${uid}`),s=>{
      const d=s.val();if(!d||d.status==='blocked')return;
      profileData=d;renderProfile(d);
    });
    incrementViews(uid,data);
  }catch(e){showNotFound();}
}

function renderProfile(d){
  const card=d.card||{};
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('mainCard').style.display='block';

  if(card.cover){const ci=document.getElementById('coverImg');ci.src=card.cover;ci.style.display='block';}
  else{document.getElementById('coverImg').style.display='none';}

  if(card.photo)document.getElementById('avatarEl').innerHTML=`<img src="${card.photo}">`;
  else document.getElementById('avatarEl').textContent=(card.name||d.name||'?').charAt(0).toUpperCase();

  const fullName=[card.name,card.surname].filter(Boolean).join(' ')||d.name||'—';
  document.getElementById('nameEl').textContent=fullName;
  document.getElementById('positionEl').textContent=card.position||'';
  document.getElementById('companyEl').textContent=card.company||'';

  if(card.bio){document.getElementById('bioEl').textContent=card.bio;document.getElementById('bioEl').style.display='block';}
  else document.getElementById('bioEl').style.display='none';

  const contacts=[];
  if(card.phone)contacts.push({icon:phoneIcon(),label:'Telefon',val:card.phone,href:'tel:'+card.phone});
  if(card.email)contacts.push({icon:emailIcon(),label:'Email',val:card.email,href:'mailto:'+card.email});
  if(card.web)contacts.push({icon:webIcon(),label:'Vebsayt',val:card.web,href:'https://'+card.web.replace(/^https?:\/\//,'')});
  if(card.address)contacts.push({icon:locIcon(),label:'Ünvan',val:card.address,href:null});
  document.getElementById('contactList').innerHTML=contacts.map(c=>`<a class="contact-row" href="${c.href||'#'}" ${c.href?'target="_blank"':''}><div class="contact-icon">${c.icon}</div><div><div class="contact-label">${c.label}</div><div class="contact-text">${c.val}</div></div></a>`).join('');

  const socials=d.socials||{};const socKeys=Object.keys(socials).filter(k=>socials[k]);
  if(socKeys.length){
    document.getElementById('socialDivider').style.display='block';
    const colors={instagram:'#C13584',linkedin:'#0077B5',facebook:'#1877F2',twitter:'#1DA1F2',tiktok:'#000',youtube:'#FF0000',telegram:'#2CA5E0',whatsapp:'#25D366'};
    const labels={instagram:'Instagram',linkedin:'LinkedIn',facebook:'Facebook',twitter:'Twitter/X',tiktok:'TikTok',youtube:'YouTube',telegram:'Telegram',whatsapp:'WhatsApp'};
    document.getElementById('socialRow').innerHTML=socKeys.map(k=>`<a class="soc-btn" href="${ensureHttp(socials[k])}" target="_blank"><span class="soc-dot" style="background:${colors[k]||'#888'}"></span>${labels[k]||k}</a>`).join('');
  } else {document.getElementById('socialDivider').style.display='none';document.getElementById('socialRow').innerHTML='';}

  if(d.video){const id=ytId(d.video);if(id){document.getElementById('videoSection').style.display='block';document.getElementById('videoFrame').innerHTML=`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;}}
  else document.getElementById('videoSection').style.display='none';

  const pdfs=d.pdfs||[];
  if(pdfs.length){document.getElementById('pdfSection').style.display='block';document.getElementById('pdfList').innerHTML=pdfs.map(p=>`<a class="pdf-item" href="${p.url}" target="_blank"><div class="pdf-icon">PDF</div><div><div class="pdf-name-t">${p.name}</div><div class="pdf-size-t">${p.size} · Yükləmək üçün klik</div></div></a>`).join('');}
  else document.getElementById('pdfSection').style.display='none';

  vCardStr=`BEGIN:VCARD\nVERSION:3.0\nFN:${fullName}\nN:${card.surname||''};${card.name||''};;;\nTITLE:${card.position||''}\nORG:${card.company||''}\nTEL;TYPE=CELL:${card.phone||''}\nEMAIL:${card.email||''}\nURL:${card.web||''}\nADR;TYPE=WORK:;;${card.address||''};;;;\nEND:VCARD`;
  generateQR(vCardStr);
}

function generateQR(text){
  const el=document.getElementById('qrModalCode');el.innerHTML='';
  try{new QRCode(el,{text,width:190,height:190,colorDark:'#0a1628',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}
}

window.saveContact=function(){
  if(!vCardStr)return;
  const b=new Blob([vCardStr],{type:'text/vcard'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=(profileData?.name||'contact')+'.vcf';a.click();
  if(profileUid)update(ref(db,`users/${profileUid}/stats`),{saves:((profileData?.stats?.saves||0)+1)});
  showToast('Kontakt yükləndi');
};
window.openQrModal=function(){document.getElementById('qrModal').classList.add('open');};
window.downloadQR=function(){const c=document.querySelector('#qrModalCode canvas');if(!c)return;const a=document.createElement('a');a.download='cardpro-qr.png';a.href=c.toDataURL('image/png');a.click();};
window.shareProfile=function(){const url=location.href;if(navigator.share)navigator.share({title:profileData?.name||'CardPro',url});else{navigator.clipboard.writeText(url);showToast('Link kopyalandı');}};

async function incrementViews(uid,data){
  await update(ref(db,`users/${uid}/stats`),{views:(data?.stats?.views||0)+1});
}
function showNotFound(){document.getElementById('loadingScreen').style.display='none';document.getElementById('notFoundCard').style.display='block';}
function ensureHttp(u){if(!u)return'#';return u.startsWith('http')?u:'https://'+u;}
function ytId(url){return url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/)?.[1];}
function phoneIcon(){return`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.73 9.5a19.79 19.79 0 01-3-8.59A2 2 0 012.7 1h3.09a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.73a16 16 0 006.29 6.29l1.1-1.1a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>`;}
function emailIcon(){return`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`;}
function webIcon(){return`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`;}
function locIcon(){return`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`;}
function showToast(m){const t=document.getElementById('toastPub');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
document.getElementById('qrModal').addEventListener('click',e=>{if(e.target===document.getElementById('qrModal'))e.target.classList.remove('open');});
loadProfile();
</script>
</body>
</html>
